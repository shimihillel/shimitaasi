<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#fff2cd" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="שימי, תעשי" />
  <title>שימי, תעשי</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell" aria-live="polite">
    <section class="paper" aria-label="שימי, תעשי">
      <div class="holes" aria-hidden="true"></div>
      <div class="margin-line" aria-hidden="true"></div>

      <header class="app-header">
        <span class="doodle doodle-heart" aria-hidden="true">♡</span>
        <span class="doodle doodle-star" aria-hidden="true">☆</span>
        <h1>שימי, תעשי</h1>
        <div class="marker-line" aria-hidden="true"></div>
        <p>מה עכשיו?</p>
      </header>

      <section id="taskList" class="task-list" aria-label="רשימת מטלות"></section>

      <section id="emptyState" class="empty-state" hidden>
        <span class="empty-arrow" aria-hidden="true">↜</span>
        <p><mark>שקט מדי.</mark><br />מה ייפול עלי תיכף??</p>
      </section>

      <button id="addTaskButton" class="add-button" type="button">
        <span aria-hidden="true">＋</span>
        <strong>עוד מטלה</strong>
      </button>
    </section>
  </main>

  <dialog id="taskDialog" class="dialog">
    <form id="taskForm" method="dialog" class="dialog-card">
      <button class="icon-close" id="closeDialogButton" type="button" aria-label="סגירה">×</button>
      <h2 id="dialogTitle"><mark>מה נפל עלייך עכשיו?</mark></h2>
      <label class="sr-only" for="taskInput">טקסט המטלה</label>
      <textarea id="taskInput" rows="3" maxlength="120" placeholder="כתוב פה..." required></textarea>
      <p class="hint"><span id="charCount">0</span>/120</p>
      <button class="save-button" type="submit">שימי, תעשי</button>
    </form>
  </dialog>

  <dialog id="deleteDialog" class="dialog small-dialog">
    <form id="deleteForm" method="dialog" class="dialog-card confirm-card">
      <h2>למחוק את זה?</h2>
      <div class="confirm-actions">
        <button class="secondary-button" id="cancelDeleteButton" type="button">לא, להשאיר</button>
        <button class="danger-button" id="confirmDeleteButton" type="button">כן, ביי</button>
      </div>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
