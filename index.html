<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#fff2cd" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="שימי, תעשי" />
  <title>שימי, תעשי</title>
  <!-- app-version: v12-shopping -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css?v=12" />
</head>
<body>
  <main class="app-shell" aria-live="polite">
    <section class="paper" aria-label="שימי, תעשי">
      <div class="holes" aria-hidden="true"></div>
      <div class="margin-line" aria-hidden="true"></div>

      <header class="app-header">
        <span class="doodle doodle-heart" aria-hidden="true">♡</span>
        <span class="doodle doodle-star" aria-hidden="true">☆</span>
        <h1 id="appTitle">שימי, תעשי</h1>
        <div class="marker-line" aria-hidden="true"></div>
        <p id="appSubtitle">מה עכשיו?</p>
        <div class="tabs" role="tablist" aria-label="בחירת רשימה">
          <button id="tasksTab" class="tab-button active" type="button" role="tab" aria-selected="true">לעשות</button>
          <button id="shoppingTab" class="tab-button" type="button" role="tab" aria-selected="false">לקנות</button>
        </div>
        <div class="header-actions">
          <button id="recurringButton" class="sort-toggle mini" type="button">קבועות</button>
          <button id="sortModeButton" class="sort-toggle mini" type="button" aria-pressed="false">סדרי לי</button>
        </div>
      </header>

      <section id="taskList" class="task-list" aria-label="רשימה"></section>

      <section id="emptyState" class="empty-state" hidden>
        <span class="empty-arrow" aria-hidden="true">↜</span>
        <p><mark>שקט מדי.</mark><br />מה ייפול עלי תיכף??</p>
      </section>

      <button id="addTaskButton" class="add-button" type="button">
        <span aria-hidden="true">＋</span>
        <strong>עוד מטלה</strong>
      </button>
    </section>
  </main>

  <dialog id="taskDialog" class="dialog">
    <form id="taskForm" method="dialog" class="dialog-card">
      <button class="icon-close" id="closeDialogButton" type="button" aria-label="סגירה">×</button>
      <h2 id="dialogTitle"><mark>מה נפל עלייך עכשיו?</mark></h2>
      <label class="sr-only" for="taskInput">טקסט המטלה</label>
      <textarea id="taskInput" rows="3" maxlength="500" placeholder="כתוב פה..." required></textarea>
      <p class="hint"><span id="charCount">0</span>/500</p>
      <button class="save-button" type="submit">שימי, תעשי</button>
    </form>
  </dialog>

  <dialog id="deleteDialog" class="dialog small-dialog">
    <form id="deleteForm" method="dialog" class="dialog-card confirm-card">
      <h2>למחוק את זה?</h2>
      <div class="confirm-actions">
        <button class="secondary-button" id="cancelDeleteButton" type="button">לא, להשאיר</button>
        <button class="danger-button" id="confirmDeleteButton" type="button">כן, ביי</button>
      </div>
    </form>
  </dialog>

  <dialog id="viewTaskDialog" class="dialog">
    <form method="dialog" class="dialog-card view-card">
      <button class="icon-close" id="closeViewDialogButton" type="button" aria-label="סגירה">×</button>
      <h2><mark>הפתק המלא</mark></h2>
      <p id="viewTaskText" class="view-task-text"></p>
      <button class="save-button" id="closeViewBottomButton" type="button">סגור, הבנתי</button>
    </form>
  </dialog>


  <dialog id="recurringDialog" class="dialog recurring-dialog">
    <div class="dialog-card recurring-card">
      <button class="icon-close" id="closeRecurringButton" type="button" aria-label="סגירה">×</button>
      <h2><mark>דברים שחוזרים להציק</mark></h2>
      <div id="recurringList" class="recurring-list"></div>
      <button id="addRecurringButton" class="save-button recurring-add" type="button">+ עוד קבועה</button>
    </div>
  </dialog>

  <dialog id="recurringFormDialog" class="dialog">
    <form id="recurringForm" method="dialog" class="dialog-card">
      <button class="icon-close" id="closeRecurringFormButton" type="button" aria-label="סגירה">×</button>
      <h2 id="recurringFormTitle"><mark>מה חוזר על עצמו?</mark></h2>
      <label class="sr-only" for="recurringInput">טקסט המטלה הקבועה</label>
      <textarea id="recurringInput" rows="3" maxlength="500" placeholder="כתוב פה..." required></textarea>

      <label class="field-label" for="recurringFrequency">כל כמה זמן?</label>
      <select id="recurringFrequency" class="recurring-select">
        <option value="daily">כל יום</option>
        <option value="weekly">פעם בשבוע</option>
        <option value="monthly">פעם בחודש</option>
      </select>

      <div id="weeklyOptions" class="schedule-options">
        <label class="field-label" for="recurringWeekday">באיזה יום?</label>
        <select id="recurringWeekday" class="recurring-select">
          <option value="0">ראשון</option>
          <option value="1">שני</option>
          <option value="2">שלישי</option>
          <option value="3">רביעי</option>
          <option value="4">חמישי</option>
          <option value="5">שישי</option>
          <option value="6">שבת</option>
        </select>
      </div>

      <div id="monthlyOptions" class="schedule-options" hidden>
        <label class="field-label" for="recurringMonthDay">באיזה יום בחודש?</label>
        <input id="recurringMonthDay" class="recurring-number" type="number" min="1" max="31" value="1" />
      </div>

      <p class="hint">אם מטלה קבועה כבר פתוחה ברשימה — לא נוצרת כפילות. תודה לאל.</p>
      <button class="save-button" type="submit">שימי, תעשי</button>
    </form>
  </dialog>

  <dialog id="deleteRecurringDialog" class="dialog small-dialog">
    <form method="dialog" class="dialog-card confirm-card">
      <h2>למחוק קבועה?</h2>
      <div class="confirm-actions">
        <button class="secondary-button" id="cancelDeleteRecurringButton" type="button">לא, להשאיר</button>
        <button class="danger-button" id="confirmDeleteRecurringButton" type="button">כן, ביי</button>
      </div>
    </form>
  </dialog>

  <script src="app.js?v=12"></script>
</body>
</html>
